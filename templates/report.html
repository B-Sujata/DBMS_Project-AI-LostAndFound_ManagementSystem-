{% extends "base.html" %} {% block title %}Report an Item{% endblock %} {% block
content %}
<div class="card mx-auto mt-5" style="max-width: 600px">
  <div class="card-header">
    <h2 class="card-title text-center">Report a {{ item_type|title }} Item</h2>
  </div>
  <div class="card-body">
    <form method="POST" enctype="multipart/form-data">
      <div class="mb-3">
        <label for="description" class="form-label">Description</label>
        <textarea
          class="form-control"
          id="description"
          name="description"
          rows="3"
          required
        ></textarea>
      </div>
      <div class="row mb-3">
        <div class="col-md-6">
          <label for="location" class="form-label"
            >Location where {{ item_type }}</label
          >
          <input
            type="text"
            class="form-control"
            id="location"
            name="location"
            required
          />
        </div>
        <div class="col-md-6">
          <label for="date" class="form-label">Date when {{ item_type }}</label>
          <input
            type="date"
            class="form-control"
            id="date"
            name="date"
            required
          />
        </div>
      </div>
      <div class="mb-3">
        <label for="category" class="form-label">Category</label>
        <select class="form-select" id="category" name="category_id" required>
          {% for category in categories %}
          <option value="{{ category.id }}">{{ category.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label for="file" class="form-label">Upload Image</label>
        <input
          class="form-control"
          type="file"
          id="file"
          name="file"
          accept="image/*"
          required
        />
      </div>
      <div class="d-grid gap-2">
        <button type="submit" class="btn btn-primary">Submit Report</button>
        <a href="{{ url_for('home') }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
